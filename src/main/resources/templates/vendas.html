<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendas - IFVerde</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/img/logosite.ico}">
    <style>
        .alert-error {
            background-color: #450a0a;
            color: #fca5a5;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #b91c1c;
            margin-bottom: 1.5rem;
            font-weight: bold;
            text-align: center;
        }
    </style>
</head>

<body>
    <header>
        <div class="container">
            <a href="/"><img src="/img/logo.png" alt="Logo IFVERDE"></a>
            <nav>
                <ul>
                    <li><a href="/">🏠 Início</a></li>
                    <li><a href="/estoque">📦 Estoque</a></li>
                    <li><a href="/vendas">💰 Vendas</a></li>
                    <li><a href="/despesas">💸 Despesas</a></li>
                    <li><a href="/calendario">📅 Calendário</a></li>
                    <li><a href="/historico">📊 Relatórios</a></li>
                    <li><a href="/manual">📖 Manual</a></li>
                    <li>
                        <form th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
                            <button type="submit"
                                style="background: none; border: none; padding: 0.7rem 1.2rem; color: #ef4444; cursor: pointer; font-weight: 600; font-size: 0.95rem; border-radius: 8px; transition: all 0.3s ease; border: 1px solid #ef4444;">
                                🚪 Sair
                            </button>
                        </form>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div th:if="${mensagemErro}" class="alert-error">
            ⚠️ <span th:text="${mensagemErro}"></span>
        </div>

        <section class="card-section">
            <h1>Registrar Nova Venda</h1>
            <p>Selecione o produto e a quantidade. O valor será calculado automaticamente.</p>

            <div style="margin-bottom: 1.5rem; text-align: right;">
                <button class="btn btn-secondary" onclick="exportarVendasCSV()">📥 Exportar Vendas</button>
                <button class="btn btn-secondary" onclick="gerarVendasPDF()">📊 Gerar PDF</button>
            </div>

            <form th:action="@{/venda/salvar}" th:object="${novaVenda}" method="post">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label for="produtoSelect">Produto:</label>
                        <select id="produtoSelect" th:field="*{produto}" required onchange="calcularTotal()">
                            <option value="" data-preco="0" selected>Selecione...</option>
                            <option th:each="prod : ${produtosDisponiveis}" th:value="${prod.id}"
                                th:data-preco="${prod.precoUnitario != null ? prod.precoUnitario : 0}"
                                th:text="${prod.nome} + ' (R$ ' + ${#numbers.formatDecimal(prod.precoUnitario != null ? prod.precoUnitario : 0, 1, 2)} + ' cada ' + ${prod.unidade} + ' - Em estoque: ' + ${prod.quantidade} + ')'">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="quantidadeInput">Quantidade Vendida:</label>
                        <input type="number" step="0.1" id="quantidadeInput" th:field="*{quantidadeVendida}"
                            placeholder="0.0" required oninput="calcularTotal()">
                    </div>

                    <div class="form-group">
                        <label for="valorInput">Valor Total (R$):</label>
                        <input type="number" step="0.01" id="valorInput" th:field="*{valor}" placeholder="Automático..."
                            required readonly
                            style="background-color: #1e293b; cursor: not-allowed; border-color: #4ade80;">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="data">Data da Venda:</label>
                        <input type="date" id="data" th:field="*{data}" required>
                    </div>
                    <div class="form-group" style="flex: 2;">
                        <label for="descricao">Observação (Opcional):</label>
                        <input type="text" id="descricao" th:field="*{descricao}"
                            placeholder="Ex: Cliente Restaurante...">
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Confirmar
                    Venda</button>
            </form>
        </section>

        <section class="card-section">
            <h2>Histórico de Vendas</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Produto</th>
                            <th>Qtd.</th>
                            <th>Valor Total</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="venda : ${listaVendas}">
                            <td th:text="${#temporals.format(venda.data, 'dd/MM/yyyy')}"></td>
                            <td>
                                <strong th:if="${venda.produto != null}" th:text="${venda.produto.nome}"
                                    style="color: #cbd5e1;"></strong>
                            </td>
                            <td>
                                <span th:text="${venda.quantidadeVendida}"></span>
                                <span th:if="${venda.produto != null}" th:text="${venda.produto.unidade}"></span>
                            </td>
                            <td style="color: #4ade80; font-weight: bold;"
                                th:text="'R$ ' + ${#numbers.formatDecimal(venda.valor, 1, 2)}"></td>
                            <td class="text-right">
                                <a th:href="@{/venda/excluir/{id}(id=${venda.id})}" style="color: #ef4444;"
                                    onclick="return confirm('Excluir venda?')">✕</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listaVendas)}">
                            <td colspan="5" class="text-center">Nenhuma venda registrada.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 IFVerde</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        function calcularTotal() {
            var select = document.getElementById('produtoSelect');
            var qtdInput = document.getElementById('quantidadeInput');
            var valorInput = document.getElementById('valorInput');
            var precoUnitario = select.options[select.selectedIndex].getAttribute('data-preco');
            var quantidade = qtdInput.value;
            if (precoUnitario && Skinner && quantidade)skinner
            if (precoUnitario && quantidade) {
                var total = parseFloat(precoUnitario) * parseFloat(Skinner);
                var total = parseFloat(precoUnitario) * parseFloat(quantidade);
                valorInput.value = total.toFixed(2);
            } else {
                valorInput.value = '';
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('data').valueAsDate = new Date();
        });

        function exportarVendasCSV() {
            const tabela = document.querySelector('table');
            let csv = 'Data,Produto,Quantidade,Valor Total\n';
            const linhas = tabela.querySelectorAll('tbody tr');
            linhas.forEach(linha => {
                const colunas = linha.querySelectorAll('td');
                if (colunas.length > 0 && colunas[0].textContent.includes('/')) {
                    const data = colunas[0].textContent;
                    const produto = colunas[1].textContent;
                    const qtd = colunas[2].textContent;
                    const valor = colunas[3].textContent;
                    csv += `"${data}","${produto}","${qtd}","${valor}"\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'vendas-ifverde.csv';
            link.click();
        }

        function gerarVendasPDF() {
            const element = document.createElement('div');
            element.style.padding = '20px';
            element.style.backgroundColor = '#ffffff';
            element.style.color = '#000000';
            element.style.fontFamily = 'Arial, sans-serif';
            element.innerHTML = `
                <div style="text-align: center; margin-bottom: 25px; border-bottom: 2px solid #22c55e; padding-bottom: 10px;">
                    <h1 style="margin: 0; color: #1e293b; font-size: 22px;">IFVerde - Histórico de Vendas</h1>
                    <p style="margin: 5px 0 0 0; color: #64748b; font-size: 13px;">Relatório de Entradas e Vendas Realizadas</p>
                </div>
            `;
            const originalTable = document.querySelector('table').cloneNode(true);
            originalTable.style.width = '100%';
            originalTable.style.borderCollapse = 'collapse';
            originalTable.style.color = '#000000';
            originalTable.style.marginTop = '10px';
            const headers = originalTable.querySelectorAll('th');
            headers.forEach(th => {
                th.style.backgroundColor = '#f1f5f9';
                th.style.color = '#1e293b';
                th.style.padding = '10px';
                th.style.border = '1px solid #cbd5e1';
                th.style.fontSize = '12px';
                th.style.textTransform = 'uppercase';
                th.style.textAlign = 'left';
            });
            const cells = originalTable.querySelectorAll('td');
            cells.forEach(td => {
                td.style.padding = '10px';
                td.style.border = '1px solid #cbd5e1';
                td.style.color = '#334155';
                td.style.backgroundColor = '#ffffff';
                td.style.fontSize = '12px';
            });
            const rows = originalTable.querySelectorAll('tr');
            rows.forEach(row => {
                if (row.cells.length > 0) {
                    row.cells[row.cells.length - 1].remove();
                }
            });
            const bodyRows = originalTable.querySelectorAll('tbody tr');
            bodyRows.forEach(row => {
                const valorCell = row.cells[3];
                if (valorCell && !row.querySelector('.text-center')) {
                    valorCell.style.color = '#16a34a';
                    valorCell.style.fontWeight = 'bold';
                }
            });
            element.appendChild(originalTable);
            const opt = {
                margin: 15,
                filename: 'vendas-ifverde.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>

</html>
