<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas - IFVerde</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/img/logosite.ico}">
</head>

<body>
    <header>
        <div class="container">
            <a href="/"><img src="/img/logo.png" alt="Logo IFVERDE"></a>
            <nav>
                <ul>
                    <li><a href="/">🏠 Início</a></li>
                    <li><a href="/estoque">📦 Estoque</a></li>
                    <li><a href="/vendas">💰 Vendas</a></li>
                    <li><a href="/despesas">💸 Despesas</a></li>
                    <li><a href="/calendario">📅 Calendário</a></li>
                    <li><a href="/historico">📊 Relatórios</a></li>
                    <li><a href="/manual">📖 Manual</a></li>
                    <li>
                        <form th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
                            <button type="submit"
                                style="background: none; border: none; padding: 0.7rem 1.2rem; color: #ef4444; cursor: pointer; font-weight: 600; font-size: 0.95rem; border-radius: 8px; transition: all 0.3s ease; border: 1px solid #ef4444;">
                                🚪 Sair
                            </button>
                        </form>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card-section" style="border-top: 4px solid #e74c3c;">
            <h1 style="color: #c0392b;">Registrar Despesa</h1>
            <p>Gastos com adubo, sementes, ferramentas, etc.</p>

            <div style="margin-bottom: 1.5rem; text-align: right;">
                <button class="btn btn-secondary" onclick="exportarDespesasCSV()">📥 Exportar Despesas</button>
                <button class="btn btn-secondary" onclick="gerarDespesasPDF()">📊 Gerar PDF</button>
            </div>

            <form th:action="@{/despesa/salvar}" th:object="${novaDespesa}" method="post">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>Descrição da Despesa</label>
                        <input type="text" th:field="*{descricao}" placeholder="Ex: Compra de Sementes" required>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" th:field="*{valor}" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" th:field="*{data}" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger">Salvar Despesa</button>
            </form>
        </section>

        <section class="card-section">
            <h2>Últimas Despesas</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Descrição</th>
                            <th>Valor (R$)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="despesa : ${listaDespesas}">
                            <td th:text="${#temporals.format(despesa.data, 'dd/MM/yyyy')}"></td>
                            <td th:text="${despesa.descricao}"></td>
                            <td style="color: #c0392b; font-weight: bold;" th:text="'R$ ' + ${despesa.valor}"></td>
                            <td class="text-right">
                                <a th:href="@{/despesa/excluir/{id}(id=${despesa.id})}" style="color: #999;"
                                    onclick="return confirm('Excluir despesa?')">✕</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listaDespesas)}">
                            <td colspan="4" class="text-center">Nenhuma despesa registrada.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2025 IFVerde</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script th:inline="javascript">
        const dEv = [[${novoEventoData}]];
        const tEv = [[${novoEventoTipo}]];
        const cEv = [[${novoEventoDesc}]];
        if (dEv && tEv && cEv) {
            let evs = JSON.parse(localStorage.getItem('ifverde-eventos')) || {};
            if (!evs[dEv]) evs[dEv] = [];
            if (!evs[dEv].some(e => e.descricao === cEv)) {
                evs[dEv].push({ tipo: tEv, descricao: cEv });
                localStorage.setItem('ifverde-eventos', JSON.stringify(evs));
            }
        }

        function exportarDespesasCSV() {
            const tabela = document.querySelector('table');
            let csv = 'Data,Descrição,Valor\n';
            const linhas = tabela.querySelectorAll('tbody tr');
            linhas.forEach(linha => {
                const colunas = inline = linha.querySelectorAll('td');
                if (colunas.length > 0 && colunas[0].textContent.includes('/')) {
                    const data = colunas[0].textContent;
                    const desc = colunas[1].textContent;
                    const valor = colunas[2].textContent;
                    csv += `"${data}","${desc}","${valor}"\n`;
                }
            });
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'despesas-ifverde.csv';
            link.click();
        }

        function gerarDespesasPDF() {
            const element = document.createElement('div');
            element.style.padding = '20px';
            element.style.backgroundColor = '#ffffff';
            element.style.color = '#000000';
            element.style.fontFamily = 'Arial, sans-serif';
            element.innerHTML = `
                <div style="text-align: center; margin-bottom: 25px; border-bottom: 2px solid #ef4444; padding-bottom: 10px;">
                    <h1 style="margin: 0; color: #1e293b; font-size: 22px;">IFVerde - Relatório de Despesas</h1>
                    <p style="margin: 5px 0 0 0; color: #64748b; font-size: 13px;">Histórico de Gastos e Despesas</p>
                </div>
            `;
            const originalTable = document.querySelector('table').cloneNode(true);
            originalTable.style.width = '100%';
            originalTable.style.borderCollapse = 'collapse';
            originalTable.style.color = '#000000';
            originalTable.style.marginTop = '10px';
            const headers = originalTable.querySelectorAll('th');
            headers.forEach(th => {
                th.style.backgroundColor = '#f1f5f9';
                th.style.color = '#1e293b';
                th.style.padding = '10px';
                th.style.border = '1px solid #cbd5e1';
                th.style.fontSize = '12px';
                th.style.textTransform = 'uppercase';
                th.style.textAlign = 'left';
            });
            const cells = originalTable.querySelectorAll('td');
            cells.forEach(td => {
                td.style.padding = '10px';
                td.style.border = '1px solid #cbd5e1';
                td.style.color = '#334155';
                td.style.backgroundColor = '#ffffff';
                td.style.fontSize = '12px';
            });
            const rows = originalTable.querySelectorAll('tr');
            rows.forEach(row => {
                if (row.cells.length > 0) {
                    row.cells[row.cells.length - 1].remove();
                }
            });
            const bodyRows = originalTable.querySelectorAll('tbody tr');
            bodyRows.forEach(row => {
                const valorCell = row.cells[2];
                if (valorCell && !row.querySelector('.text-center')) {
                    valorCell.style.color = '#dc2626';
                    valorCell.style.fontWeight = 'bold';
                }
            });
            element.appendChild(originalTable);
            const opt = {
                margin: 15,
                filename: 'despesas-ifverde.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>

</html>
