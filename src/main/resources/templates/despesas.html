<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Despesas - IFVerde</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/png" th:href="@{/img/logosite.ico}">
</head>

<body>
    <header>
        <div class="container">
            <a href="/"><img src="/img/logo.png" alt="Logo IFVERDE"></a>
            <nav>
                <ul>
                    <li><a href="/">🏠 Início</a></li>
                    <li><a href="/estoque">📦 Estoque</a></li>
                    <li><a href="/vendas">💰 Vendas</a></li>
                    <li><a href="/despesas">💸 Despesas</a></li>
                    <li><a href="/calendario">📅 Calendário</a></li>
                    <li><a href="/historico">📊 Relatórios</a></li>
                    <li><a href="/manual">📖 Manual</a></li>
                    <li>
                        <form th:action="@{/logout}" method="post" style="display: inline; margin: 0;">
                            <button type="submit"
                                style="background: none; border: none; padding: 0.7rem 1.2rem; color: #ef4444; cursor: pointer; font-weight: 600; font-size: 0.95rem; border-radius: 8px; transition: all 0.3s ease; border: 1px solid #ef4444;">
                                🚪 Sair
                            </button>
                        </form>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card-section" style="border-top: 4px solid #e74c3c;">
            <h1 style="color: #c0392b;">Registrar Despesa</h1>
            <p>Gastos com adubo, sementes, ferramentas, etc.</p>

            <div style="margin-bottom: 1.5rem; text-align: right;">
                <button class="btn btn-secondary" onclick="exportarDespesasCSV()">📥 Exportar Despesas</button>
                <button class="btn btn-secondary" onclick="gerarDespesasPDF()">📊 Gerar PDF</button>
            </div>

            <form th:action="@{/despesa/salvar}" th:object="${novaDespesa}" method="post">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>Descrição da Despesa</label>
                        <input type="text" th:field="*{descricao}" placeholder="Ex: Compra de Sementes" required>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="number" step="0.01" th:field="*{valor}" placeholder="0.00" required>
                    </div>
                    <div class="form-group">
                        <label>Data</label>
                        <input type="date" th:field="*{data}" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-danger">Salvar Despesa</button>
            </form>
        </section>

        <section class="card-section">
            <h2>Últimas Despesas</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Descrição</th>
                            <th>Valor (R$)</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="despesa : ${listaDespesas}">
                            <td th:text="${#temporals.format(despesa.data, 'dd/MM/yyyy')}">Data</td>
                            <td th:text="${despesa.descricao}">Desc</td>
                            <td style="color: #c0392b; font-weight: bold;" th:text="'R$ ' + ${despesa.valor}">Val</td>
                            <td class="text-right">
                                <a th:href="@{/despesa/excluir/{id}(id=${despesa.id})}" style="color: #999;"
                                    onclick="return confirm('Excluir despesa?')">✕</a>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(listaDespesas)}">
                            <td colspan="4" class="text-center">Nenhuma despesa registrada.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>
    <footer>
        <p>&copy; 2025 IFVerde</p>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script>
        function exportarDespesasCSV() {
            const tabela = document.querySelector('table');
            let csv = 'Data,Descrição,Valor\n';
            
            const linhas = tabela.querySelectorAll('tbody tr');
            linhas.forEach(linha => {
                const colunas = linha.querySelectorAll('td');
                if (colunas.length > 0 && colunas[0].textContent.includes('/')) {
                    const data = colunas[0].textContent;
                    const desc = colunas[1].textContent;
                    const valor = colunas[2].textContent;
                    csv += `"${data}","${desc}","${valor}"\n`;
                }
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'despesas-ifverde.csv';
            link.click();
        }

        function gerarDespesasPDF() {
            const element = document.querySelector('.card-section');
            const opt = {
                margin: 10,
                filename: 'despesas-ifverde.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2 },
                jsPDF: { orientation: 'portrait', unit: 'mm', format: 'a4' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>
</body>

</html>
